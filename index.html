<!DOCTYPE html>
<html lang="en">                                                      <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Zamaon Login</title>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {                                                                  font-family: 'Inter', sans-serif;
    background-color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;                                                   border: 1px solid #ddd;
    padding: 32px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .logo {
    font-size: 2rem;
    font-weight: 700;
    color: #232f3e;
    position: relative;
  }

  .logo span {
    color: #ff9900;
  }

  .smile {
    position: absolute;
    bottom: -8px;
    left: 50%;
    width: 80px;
    height: 20px;
    transform: translateX(-50%) rotate(180deg);
  }

  .smile svg path {
    stroke: #ff9900;
    stroke-width: 6;
    fill: transparent;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
  }

  button {
    background-color: #ffd814;
    border: 1px solid #fcd200;
    padding: 10px;
    margin-top: 16px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }

  #message {
    margin-top: 16px;
    font-weight: 600;
  }

  .success { color: green; }
  .error { color: red; }

</style>
</head>
<body>

<div class="container">
  <div class="logo">
    zamaon<span>.</span>
    <div class="smile">
      <svg viewBox="0 0 100 20">
        <path d="M10,15 Q50,0 90,15"></path>
      </svg>
    </div>
  </div>

  <h3>Sign-In</h3>

  <label>Set Password</label>
  <input id="setPassword" type="password" placeholder="Create a password">

  <label>Check Password</label>
  <input id="checkPassword" type="password" placeholder="Enter password to check">

  <button id="saveBtn">Set Password</button>

  <div id="currentGuess">Waiting...</div>
  <div id="message"></div>
</div>

<script>
const socket = io.connect(window.location.origin);                    let localPassword = '';
let isFrozen = false;

const setPassword = document.getElementById('setPassword');           const checkPassword = document.getElementById('checkPassword');
const saveBtn = document.getElementById('saveBtn');
const currentGuess = document.getElementById('currentGuess');
const msg = document.getElementById('message');

saveBtn.addEventListener('click', () => {
  localPassword = setPassword.value.trim();
  if (!localPassword) {
    msg.textContent = 'Enter a password first.';
    msg.className = 'error';
    return;
  }
  msg.textContent = 'Password set.';
  msg.className = 'success';
  currentGuess.textContent = 'Waiting for guesses...';
});

socket.on('update_field', (data) => {
  if (!localPassword || isFrozen) return;
  currentGuess.textContent = data.value;

  if (data.value === localPassword) {
    msg.textContent = 'Password matched!';
    msg.className = 'success';
    isFrozen = true;
    setPassword.disabled = true;
    saveBtn.disabled = true;
    socket.emit('stop_generation');
    socket.disconnect();
  }
});
</script>
</body>
</html>
