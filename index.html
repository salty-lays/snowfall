<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Flower Garden</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
}

.container{
    display:flex;
    gap:40px;
}

.pot{
    width:120px;
    height:90px;
    background:#8b4513;
    border-radius:0 0 30px 30px;
    position:relative;
}

.stem{
    width:6px;
    height:80px;
    background:green;
    position:absolute;
    left:50%;
    bottom:90px;
    transform:translateX(-50%);
}

.flower{
    width:50px;
    height:50px;
    background:pink;
    border-radius:50%;
    position:absolute;
    left:50%;
    bottom:160px;
    transform:translateX(-50%);
    box-shadow:
    -20px 0 pink,
    20px 0 pink,
    0 -20px pink,
    0 20px pink;
}

.center{
    width:22px;
    height:22px;
    background:yellow;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.message{
    position:absolute;
    top:60px;
    font-size:40px;
    color:white;
    text-shadow:0 0 10px red;
}

.heart{
    position:fixed;
    color:red;
    font-size:20px;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-800px);
        opacity:0;
    }
}

</style>
</head>

<body>


<div class="container">

<div class="pot">
<div class="stem"></div>
<div class="flower">
<div class="center"></div>
</div>
</div>

<div class="pot">
<div class="stem"></div>
<div class="flower">
<div class="center"></div>
</div>
</div>

<div class="pot">
<div class="stem"></div>
<div class="flower">
<div class="center"></div>
</div>
</div>

</div>

<script>

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=Math.random()*20+20+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
