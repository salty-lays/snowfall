<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zamaon — Sign-In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff9900;
    --bg: linear-gradient(180deg,#f7f8fa,#fffaf4);
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    width: 380px;
    padding: 28px;
    text-align: center;
  }

  /* LOGO AREA */
  .logo {
    display: inline-block;
    position: relative;
    font-weight: 700;
    font-size: 28px;
    color: #232f3e;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .logo span {
    color: var(--accent);
  }

  /* Upside-down Amazon-style smile */
  .frown {
    width: 80px;
    height: 20px;
    border-bottom: 4px solid var(--accent);
    border-radius: 50%;
    position: absolute;
    left: 50%;
    bottom: -16px;
    transform: translateX(-50%) rotate(180deg); /* flip to make frown */
  }

  h1 {
    margin-top: 10px;
    font-size: 18px;
    color: #111;
  }

  label {
    text-align: left;
    display: block;
    margin-top: 14px;
    font-weight: 600;
    color: #333;
    font-size: 13px;
  }

  input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 15px;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 5px rgba(255,153,0,0.3);
  }

  button {
    background: var(--accent);
    color: #111;
    font-weight: 700;
    border: none;
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    margin-top: 20px;
    cursor: pointer;
  }

  button:hover {
    background: #e68a00;
  }

  .status {
    margin-top: 14px;
    font-weight: 600;
    color: #555;
    font-size: 14px;
  }

  .success {
    color: #15803d;
  }

  footer {
    margin-top: 20px;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    Amazon<span>.in</span>
    <div class="frown"></div>
  </div>

  <h1>Sign-In</h1>

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="you@zamaon.com">

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Focus this field for ADB input">

  <button id="saveBtn">Set Password</button>

  <div id="status" class="status">No password set</div>
  <div id="currentGuess" class="status">Waiting for ADB input…</div>

  <footer>© 2025 Amazon</footer>
</div>

<script>
const passwordEl = document.getElementById('password');
const saveBtn = document.getElementById('saveBtn');
const statusEl = document.getElementById('status');
const currentGuess = document.getElementById('currentGuess');
let storedPassword = 'chetan';
let frozen = false;

saveBtn.addEventListener('click', () => {
  storedPassword = passwordEl.value.trim();
  if (!storedPassword) {
    statusEl.textContent = 'Please enter a password first.';
    return;
  }
  statusEl.textContent = 'Password set. Awaiting ADB input...';
  passwordEl.value = '';
  passwordEl.focus();
});

passwordEl.addEventListener('input', () => {
  if (frozen) return;
  const val = passwordEl.value;
  currentGuess.textContent = val || '⟨empty⟩';
  if (storedPassword && val === storedPassword) {
    frozen = true;
    statusEl.textContent = '✅ Password matched!';
    statusEl.classList.add('success');
    passwordEl.disabled = true;
    saveBtn.disabled = true;
  }
});
</script>
</body>
</html>
